version: '3.8'

services:
  db:
    image: mysql:8.0
    restart: always
    environment:
      MYSQL_DATABASE: 'hospital_requests'
      MYSQL_ROOT_PASSWORD: 'Rohan@54321' 
    ports:
      - '3306:3306'
    volumes:
      - db_data:/var/lib/mysql

  backend:
    build: ./backend
    ports:
      - '3000:3000'
    depends_on:
      - db
    environment:
      DB_HOST: localhost
      DB_USER: root
      DB_PASSWORD: Rohan@54321 
      DB_NAME: hospital_requests
    restart: always

volumes:
  db_data: